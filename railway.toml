# Railway deploy config.
#
# Why this file exists: without preDeployCommand running `prisma migrate
# deploy`, Railway ships the build but never applies pending migrations
# before the app starts handling requests. lessons.md 2026-04-10 is the
# exact failure mode this prevents — a regenerated Prisma client SELECTs
# columns that don't exist yet and every authenticated request throws
# P2022.
#
# Migration authoring workflow (per lessons.md):
#   1. `npm run db:migrate -- --create-only --name <slug>` locally
#   2. Commit the generated SQL in prisma/migrations/
#   3. Push; Railway runs `prisma migrate deploy` here before the app
#      starts the new container
#
# Minimal override: only sets preDeployCommand. Builder + startCommand
# stay at whatever the Railway service is configured for (currently
# RAILPACK + auto-detected `next start`) so this file doesn't regress
# the build pipeline, only adds the migrate step.

[deploy]
preDeployCommand = "npx prisma migrate deploy"
